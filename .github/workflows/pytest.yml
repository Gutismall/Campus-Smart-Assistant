name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: adminpassword
          POSTGRES_DB: campus_data_db
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    # Check what files changed to decide which tests to run
    - name: Check for changes
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          services:
            - 'backend/services/**'
            - 'backend/tests/test_llm.py'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alembic migrations
      working-directory: backend
      env:
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
      run: |
        alembic upgrade head

    - name: Seed required data
      working-directory: backend
      env:
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      run: |
        python seed.py
        
    - name: Run Authentication Tests (Always)
      working-directory: backend
      env:
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: |
        python -m pytest tests/test_auth.py

    - name: Run LLM Tests (Conditionally)
      if: steps.changes.outputs.services == 'true'
      working-directory: backend
      env:
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LLM_PROVIDER: "gemini"
        GEMINI_MODEL: "gemini-2.5-flash"
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        JWT_EXPIRE_HOURS: "24"
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        TEXT_TO_SQL_SCHEMA_CONTEXT: ${{ secrets.TEXT_TO_SQL_SCHEMA_CONTEXT }}
      run: |
        python -m pytest tests/test_llm.py
