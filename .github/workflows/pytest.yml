name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: adminpassword
          POSTGRES_DB: campus_data_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alembic migrations
      working-directory: backend
      env:
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
      run: |
        alembic upgrade head

    - name: Seed required data
      working-directory: backend
      env:
        # DB connection string for the test run
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
        # Secrets used for seeding
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      run: |
        python seed.py
        
    - name: Run tests with pytest
      working-directory: backend
      env:
        # DB connection string for the test run
        DATABASE_URL: "postgresql://admin:adminpassword@localhost:5432/campus_data_db"
        # Secrets used by the LLM and Auth during tests
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LLM_PROVIDER: "gemini"
        GEMINI_MODEL: "gemini-3.1-flash-lite-preview"
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        JWT_EXPIRE_HOURS: "24"
        # Admin credentials (sometimes needed in test comparisons)
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        # Pass the prompt context via an environment variable
        TEXT_TO_SQL_SCHEMA_CONTEXT: ${{ secrets.TEXT_TO_SQL_SCHEMA_CONTEXT }}
      run: |
        pytest tests/
